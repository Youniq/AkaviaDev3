<!--
  @description       : Shows the latest Invoices for a logged in Experience user and let's the user pay the outstanding invoices via Swish
  @author            : Håkon Kavli @https://trailblazer.me/id/hkavli
  @group             : Stretch Engage
  @last modified on  : 2025-04-01
  @last modified by  : Malin Nilsson (Stretch Customer AB)
-->
<template>

  <!-- BEGIN UNPAID INVOICES -->
  <template if:true={showUnpaidInvSection}>
    <div class="slds-grid slds-wrap slds-var-p-around_medium slds-var-m-bottom_large">
      <header class="
        slds-col
        slds-size_1-of-1
        slds-medium-size_1-of-3
        slds-large-size_1-of-4
      ">
        <!-- Malin -->
        <h2>{labels.IO_InvoicesUnpaidHeader}</h2>
      </header>

      <div class="
        slds-col
        slds-size_1-of-1
        slds-medium-size_2-of-3
        slds-large-size_3-of-4
      ">
        <template if:true={hasUnpaidInvoices}>
          <c-invoices-table invoices-list={unpaidInvoices} onopenmodal={handleOpenModal}></c-invoices-table>
        </template>
        <template if:true={hasUnpaidInvError}>
          <p class="slds-var-m-vertical_medium">
            {labels.IO_ErrorUnpaidInvoices}
          </p>
        </template>
      </div>
    </div>
  </template>
  <!-- END UNPAID INVOICES -->
  <!-- BEGIN LATEST INVOICES -->
  <div class="slds-grid slds-wrap slds-var-p-around_medium slds-var-m-bottom_large">
    <header class="
        slds-col
        slds-size_1-of-1
        slds-medium-size_1-of-3
        slds-large-size_1-of-4
      ">
      <h2>{labels.IO_InvoicesHeader}</h2>
    </header>

    <div class="
        slds-col
        slds-size_1-of-1
        slds-medium-size_2-of-3
        slds-large-size_3-of-4
      ">
      <template if:true={componentLoading}>
        <div class="spinner">
          <lightning-spinner variant="brand" alternative-text="Loading" size="large"></lightning-spinner>
        </div>
      </template>
      <template if:false={componentLoading}>
        <template if:true={hasInvoices}>
          <c-invoices-table invoices-list={invoices} onopenmodal={handleOpenModal}></c-invoices-table>
        </template>
        <template if:true={hasInvoicesError}>
          <p class="slds-var-m-vertical_medium">
            {labels.IO_ErrorPaidInvoices}
          </p>
        </template>
        <template if:false={hasInvoices}>
          <p class="slds-var-m-vertical_medium">
            {labels.IO_NoInvoicesPart1}&nbsp;
            <a href="/minasidor/s/arende" target="blank" rel="noopener noreferrer">{labels.IO_NoInvoicesPart2}</a>
            &nbsp;{labels.IO_NoInvoicesPart3}
          </p>
        </template>
      </template>
    </div>
  </div>
  <!-- END LATEST INVOICES -->

  <template if:true={isModalOpen}>
    <!-- Modal/Popup Box LWC starts here -->
    <section role="dialog" tabindex="-1" aria-labelsledby="modal-heading-01" aria-modal="true"
      aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open slds-align_absolute-center">
      <div class="slds-modal__container">
        <!-- Modal/Popup Box LWC body starts here -->
        <header class="slds-modal__header slds-modal__header_empty">
          <button class="
                  slds-button slds-button_icon
                  slds-modal__close
                  slds-button_icon-inverse
                  slds-text-heading_large
                " title="Close" onclick={closeModal}>
            &#10006;
            <span class="slds-assistive-text">{labels.IO_CloseModal}</span>
          </button>
        </header>
        <div class="slds-modal__content slds-var-p-around_medium" id="modal-content-id-1">
          <div class="slds-grid">
            <div class="slds-col slds-size_1-of-1">
              <template if:true={isFeeCatDubbelSrat}>
                <div class="slds-var-m-vertical_large slds-var-p-horizontal_medium">
                  <p style="white-space: pre-line;">{labels.Swish_DubbelanslutenSRAT_text}</p>
                </div>
              </template>
              <template if:false={isFeeCatDubbelSrat}>
                <div>
                  <img src={swishLogo} width="20%" class="slds-align_absolute-center"
                    alt="Round Swish logo which looks like rainbow colored fishes" />

                  <template if:false={swishPaySuccess}>
                    <div class="slds-var-m-top_large" id="InputPhoneSection">
                      <h4 class="slds-align_absolute-center">
                        <abbr title="obligatoriskt" class="slds-required">*</abbr>
                        {labels.Billecta_Swish_Phone}
                      </h4>
                      <div id="grid" class="
                              slds-grid
                              slds-var-p-around_medium
                              slds-list_horizontal
                              slds-align_absolute-center
                            ">
                        <div id="InputArea" class="
                                slds-var-m-around_x-small
                                slds-col
                                slds-size_1-of-1
                                slds-medium-size_1-of-2
                                slds-large-size_1-of-2
                              ">
                          <lightning-input class="slds-align_absolute-center" variant="label-hidden" name="phone"
                            data-id="phone" type="tel" labels={labels.Billecta_Swish_Phone} value={personMobilePhone}
                            pattern={PHONEPATTERN} placeholder="+467xxxxxxxx" onchange={handleChange}
                            message-when-bad-input={labels.Billecta_Swish_WrongFormat}
                            message-when-pattern-mismatch={labels.Billecta_Swish_WrongFormat} min-length="11"
                            max-length="13" required></lightning-input>
                        </div>
                        <div class="
                                slds-show_small
                                slds-size_1-of-1
                                slds-medium-size_1-of-2
                                slds-large-size_1-of-2
                              " title="Button for creating a Swish Payment">
                          <button labels={labels.Billecta_Swish_InitiatePayment} onclick={handlePayment}
                            disabled={paymentButtonIsDisabled} class="
                                  slds-button slds-button_brand
                                  slds-align_absolute-center
                                  btn-pay
                                ">
                            {labels.IO_PaySwish}
                          </button>
                        </div>
                      </div>
                      <div class="slds-hide_small slds-size_1-of-1" title="Mobile button for creating a Swish Payment">
                        <button labels={labels.Billecta_Swish_InitiatePayment} onclick={handlePayment}
                          disabled={paymentButtonIsDisabled} class="
                              slds-var-m-bottom_large
                              slds-button slds-button_brand
                              slds-align_absolute-center
                              slds-button_stretch
                              btn-pay
                            ">
                          {labels.IO_PaySwish}
                        </button>
                      </div>
                    </div>
                  </template>
                  <!--loading spinner start-->
                  <template if:true={swishIsLoading}>
                    <div class="slds-is-relative slds-var-m-vertical_large"
                      style="background-color: #cfdaeb; height: 5rem">
                      <div class="
                            slds-spinner--brand
                            slds-spinner slds-spinner--large
                            slds-is-relative
                          " role="alert">
                        <span class="slds-assistive-text">Loading...</span>
                        <div class="slds-spinner__dot-a"></div>
                        <div class="slds-spinner__dot-b"></div>
                      </div>
                    </div>

                    <p class="slds-align_absolute-center">
                      {labels.Billecta_OpenSwishManual}
                    </p>
                  </template>

                  <!-- Handles error or unsuccessfull payment -->
                  <template if:true={isError}>
                    <p class="slds-var-m-around_medium slds-text-color_error">
                      {labels.IO_PaySwishError1}&nbsp;<a href="/minasidor/s/arende" target="blank"
                        rel="noopener noreferrer">{labels.IO_PaySwishError2}</a>
                    </p>
                  </template>

                  <!-- Handles Already paid-->
                  <template if:true={isAlreadyPaid}>
                    <p class="
                          slds-var-m-around_large
                          slds-var-p-around_medium
                          slds-text-color_success
                          slds-align_absolute-center
                          slds-text-heading_medium
                        ">
                      {labels.IO_AlreadyPaid} &#10003;
                    </p>
                  </template>

                  <!-- Handles success-->
                  <template if:true={swishPaySuccess}>
                    <p class="
                          slds-var-m-around_large
                          slds-var-p-around_medium
                          slds-text-color_success
                          slds-align_absolute-center
                          slds-text-heading_medium
                        ">
                      {labels.Billecta_Swish_ThanksForPayment} &#10003;
                    </p>
                  </template>

                  <button class="
                        slds-float_right
                        slds-var-m-horizontal_medium
                        slds-var-m-top_x-large
                      " id="closeModal" name="submit" type="submit" data-f-is-finalized="false"
                    data-f-is-progressive-submit="true" data-f-type="submitbutton" onclick={closeModal}>
                    {labels.IO_CloseModal}
                  </button>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

</template>
