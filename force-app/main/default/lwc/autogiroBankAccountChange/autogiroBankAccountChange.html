<template>
    <lightning-card title="Byt till autogiro" icon-name="utility:moneybag">
        <div class="slds-p-around_medium">
            <div class="slds-m-bottom_medium">
                <lightning-button
                    label="Starta kontohämtning"
                    variant="brand"
                    onclick={handleStart}
                    disabled={isLoading}>
                </lightning-button>

                <lightning-button
                    class="slds-m-left_small"
                    label="Stoppa"
                    onclick={handleStop}>
                </lightning-button>
            </div>

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Laddar"></lightning-spinner>
            </template>

            <template if:true={statusMessage}>
                <div class="slds-text-color_success slds-m-bottom_small">
                    {statusMessage}
                </div>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-text-color_error slds-m-bottom_small">
                    {errorMessage}
                </div>
            </template>

            <div id="bank-account-iframe" class="bank-account-iframe"></div>
        </div>
    </lightning-card>
</template>
